<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style>
        /* Civilization 13 Modern Chat Styling */
        body {
            background-color: #392611;
            color: #e1e1d7;
            font-family: "Book Antiqua", "Bookman Old Style", serif;
            font-size: 14px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        #chat-container {
            height: 100%;
            padding: 8px;
            box-sizing: border-box;
            overflow-y: scroll;
            scrollbar-face-color: #a68b7d;
            scrollbar-shadow-color: #271a0c;
            scrollbar-highlight-color: #e1e1d7;
            scrollbar-3dlight-color: #a68b7d;
            scrollbar-darkshadow-color: #000000;
            scrollbar-track-color: #392611;
            scrollbar-arrow-color: #271a0c;
        }

        /* Modern scrollbar for Chromium-based BYOND */
        #chat-container::-webkit-scrollbar {
            width: 12px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: #392611;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: #a68b7d;
            border: 2px solid #392611;
            border-radius: 4px;
        }

        #chat-container::-webkit-scrollbar-thumb:hover {
            background: #bda294;
        }

        #messages {
            display: flex;
            flex-direction: column;
            gap: 2px;
            word-wrap: break-word;
        }

        .message {
            line-height: 1.3;
            opacity: 0;
            animation: fadeIn 0.2s forwards ease-out;
            white-space: pre-wrap;
        }

        .message.html-content {
            white-space: normal;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Standard SS13 styles fallback */
        .notice {
            color: #5cb85c;
        }

        .warning {
            color: #f0ad4e;
            font-weight: bold;
        }

        .danger {
            color: #d9534f;
            font-weight: bold;
        }

        .admin {
            color: #9b59b6;
            font-weight: bold;
        }

        .ooc {
            color: #3498db;
            font-weight: bold;
        }

        a {
            color: #a68b7d;
            text-decoration: underline;
        }

        a:hover {
            color: #e1e1d7;
        }

        .prefix {
            font-weight: bold;
        }

        .log_message {
            color: #A9B6E7;
            font-weight: bold;
        }

        .small_message {
            color: #E1E1FF;
            font-weight: bold;
            font-size: 0.66em;
        }

        a,
        a:link,
        a:visited,
        a:active,
        a:hover {
            color: #CD4C6C;
        }

        /* OOC */
        .ooc {
            font-weight: bold;
        }

        .ooc img.text_tag {
            width: 32px;
            height: 10px;
        }

        .ooc .everyone {
            color: #1E8CBE;
        }

        .ooc .looc {
            color: #75B5B5;
        }

        .ooc .elevated {
            color: #2e78d9;
        }

        .ooc .mentor {
            color: #2e78d9;
        }

        .ooc .moderator {
            color: #2ed9ab;
        }

        .ooc .developer {
            color: #a649bf;
        }

        .ooc .admin {
            color: #39ac41;
        }

        .ooc .highstaff {
            color: #b82e00;
        }

        /* Admin: Private Messages */
        .pm .howto {
            color: #ff0000;
            font-weight: bold;
            font-size: 200%;
        }

        .pm .in {
            color: #ff0000;
        }

        .pm .out {
            color: #ff0000;
        }

        .pm .other {
            color: #1E8CBE;
        }

        /* Admin: Channels */
        .mod_channel {
            color: #735638;
            font-weight: bold;
        }

        .mod_channel .admin {
            color: #b82e00;
            font-weight: bold;
        }

        .admin_channel {
            color: #9611D4;
            font-weight: bold;
        }

        /* Radio: Misc */
        .deadsay {
            color: #8657C5;
        }

        .radio {
            color: #4CA64C;
        }

        /* Radio Channels */
        .blueradio {
            color: #6A80A9;
        }

        .SSradio {
            color: #466194;
        }

        .redradio {
            color: #B53232;
        }

        .brownradio {
            color: #7E6A46;
        }

        /* Miscellaneous */
        .name {
            font-weight: bold;
        }

        .alert {
            color: #ff0000;
        }

        h1.alert,
        h2.alert {
            color: #ff0000;
        }

        .ghostalert {
            color: #5c00e6;
            font-style: italic;
            font-weight: bold;
        }

        .emote {
            font-style: italic;
        }

        /* Game Messages */

        .attack {
            color: #ff0000;
        }

        .moderate {
            color: #CC0000;
        }

        .disarm {
            color: #990000;
        }

        .passive {
            color: #660000;
        }

        .red {
            color: #ff3737
        }

        .green {
            color: #289120
        }

        .green_bold {
            color: #289120;
            font-weight: bold;
        }

        .danger {
            color: #ff3737;
            font-weight: bold;
        }

        .userdanger {
            color: #ff3737;
            font-weight: bold;
            font-size: 2.0em;
        }

        .userdanger_yellow {
            color: #ffff00;
            font-weight: bold;
            font-size: 2.5em;
        }

        .hugedanger {
            color: #ff3737;
            font-weight: bold;
            font-size: 3.0em;
        }

        .warning {
            color: #ff3737;
            font-style: italic;
        }

        .rose {
            color: #ff5050;
        }

        .notice {
            color: #5a6d8d;
        }

        .ping {
            color: #E1E1FF;
            font-weight: bold;
        }

        .reflex_shoot {
            color: #000099;
            font-style: italic;
        }

        /* Languages */

        .rough {
            font-family: "Trebuchet MS", cursive, sans-serif;
        }

        .say_quote {
            font-family: Georgia, Verdana, sans-serif;
        }

        .interface {
            color: #704C70;
        }

        .good {
            color: #839E69;
            font-weight: bold;
        }

        .bad {
            color: #ff3737;
            font-weight: bold;
        }

        /* Chat Tags */
        .text_tag {
            display: inline-block;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 4px;
            vertical-align: middle;
            font-family: Arial, sans-serif;
            line-height: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tag-ooc {
            background-color: #1a56f0;
            color: white;
            border-color: #0d41bc;
        }

        .tag-looc {
            background-color: #36b6a6;
            color: white;
            border-color: #2a8d81;
        }

        .tag-dead,
        .tag-lobby {
            background-color: #6326c0;
            color: white;
            border-color: #4a1d8f;
        }

        .tag-asay,
        .tag-admin,
        .tag-a-discord {
            background-color: #a123f0;
            color: white;
            border-color: #7b1ab8;
        }

        .tag-mentor {
            background-color: #3986f0;
            color: white;
            border-color: #2b65b6;
        }

        .tag-pm_in {
            background-color: #f01a1a;
            color: white;
            border-color: #b81414;
        }

        .tag-pm_out_alt {
            background-color: #b04343;
            color: white;
            border-color: #8a3434;
        }

        .tag-pm_other {
            background-color: #5092c0;
            color: white;
            border-color: #3d6f92;
        }

        .tag-help {
            background-color: #ff0000;
            color: white;
            border-color: #cc0000;
        }

        .tag-discord,
        .tag-discord2 {
            background-color: #00b0f0;
            color: white;
            border-color: #0089bc;
        }

        .tag-ping {
            background-color: #f1c40f;
            color: #2c3e50;
            border-color: #f39c12;
            font-size: 9px;
        }

        .motd {
            color: #E1E1FF;
            font-family: "Book Antiqua", Verdana, sans-serif;
        }

        .motd h1,
        .motd h2,
        .motd h3,
        .motd h4,
        .motd h5,
        .motd h6 {
            margin-top: 0.2em;
            margin-bottom: 0.2em;
            color: #E1E1FF;
        }

        .motd a,
        .motd a:link,
        .motd a:visited,
        .motd a:active,
        .motd a:hover {
            color: #CD4C6C;
        }
    </style>
    <title>Civilization 13 Chat</title>
</head>

<body style="background-color: #392611; color: #e1e1d7;">
    <div id="chat-container">
        <div id="messages"></div>
    </div>
    <script src="purify.min.js"></script>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const messagesContainer = document.getElementById('messages');

        /**
         * Receives a message from BYOND.
         * @param {string|object} data - The message text or a JSON object.
         */
        let lastMessage = '';
        let lastMessageTime = 0;

        function receiveMessage(data, skip_purify = false) {
            if (!data) return;
            try {
                data = decodeURIComponent(data);
            } catch (e) {
                // world.log << "DEBUG: receiveMessage decode error: " + e.message;
            }

            let messageHtml = '';

            if (typeof data === 'string' && data.charAt(0) === '{') {
                try {
                    const parsed = JSON.parse(data);
                    messageHtml = parsed.message || data;
                } catch (e) {
                    messageHtml = data;
                }
            } else {
                messageHtml = data;
            }

            if (!messageHtml) return;

            // Deduplication for OpenDream/BYOND glitches
            if (messageHtml === lastMessage && (Date.now() - lastMessageTime) < 100) {
                return;
            }
            lastMessage = messageHtml;
            lastMessageTime = Date.now();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            if (skip_purify) {
                messageDiv.innerHTML = messageHtml;
            } else {
                messageDiv.innerHTML = DOMPurify.sanitize(messageHtml, { USE_PROFILES: { html: true } });
            }

            messagesContainer.appendChild(messageDiv);

            // Smooth auto-scroll
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Keep memory usage in check by trimming old messages (optional, set to 500)
            if (messagesContainer.children.length > 500) {
                messagesContainer.removeChild(messagesContainer.firstChild);
            }
        }

        // Expose to global scope for BYOND
        window.receiveMessage = receiveMessage;

        // Notify BYOND that we are ready
        window.location.href = 'byond://?chat_ready=1';
    </script>
</body>

</html>
