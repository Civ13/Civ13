<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Info Panels</title>
    <style>
        @font-face {
            font-family: 'Civ13Custom';
            src: url('Alegreya-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Civ13Custom';
            src: url('Alegreya-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: 'Civ13Custom';
            src: url('Alegreya-Italic.ttf') format('truetype');
            font-weight: normal;
            font-style: italic;
        }

        @font-face {
            font-family: 'Civ13Custom';
            src: url('Alegreya-BoldItalic.ttf') format('truetype');
            font-weight: bold;
            font-style: italic;
        }

        @font-face {
            font-family: 'Civ13Custom';
            src: url('Alegreya-Black.ttf') format('truetype');
            font-weight: 900;
            font-style: normal;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #392611;
            color: #e1e1d7;
            font-family: 'Civ13Custom', "Book Antiqua", "Palatino Linotype", serif;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-size: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h3 {
            font-size: 16px;
            font-weight: bold;
            padding-bottom: 2px;
            border-bottom: 1px solid;
        }

        #tabs {
            background-color: #271a0c;
            display: flex;
            border-bottom: 1px solid #1a1108;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-face-color: #a68b7d;
            scrollbar-shadow-color: #271a0c;
            scrollbar-highlight-color: #e1e1d7;
            scrollbar-3dlight-color: #a68b7d;
            scrollbar-darkshadow-color: #000000;
            scrollbar-track-color: #392611;
            scrollbar-arrow-color: #271a0c;
        }

        /* Modern scrollbar for Chromium-based BYOND */
        #tabs::-webkit-scrollbar {
            width: 12px;
        }

        #tabs::-webkit-scrollbar-track {
            background: #392611;
        }

        #tabs::-webkit-scrollbar-thumb {
            background: #a68b7d;
            border: 2px solid #392611;
            border-radius: 4px;
        }

        #tabs::-webkit-scrollbar-thumb:hover {
            background: #bda294;
        }


        .tab {
            padding: 6px 12px;
            cursor: pointer;
            user-select: none;
            font-size: 15px;
            white-space: nowrap;
            border-right: 1px solid #1a1108;
        }

        .tab:hover {
            background-color: #3f2a13;
        }

        .tab.active {
            background-color: #392611;
            color: #ff8040;
        }

        #content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 8px;
            scrollbar-face-color: #a68b7d;
            scrollbar-shadow-color: #271a0c;
            scrollbar-highlight-color: #e1e1d7;
            scrollbar-3dlight-color: #a68b7d;
            scrollbar-darkshadow-color: #000000;
            scrollbar-track-color: #392611;
            scrollbar-arrow-color: #271a0c;
        }

        /* Modern scrollbar for Chromium-based BYOND */
        #content::-webkit-scrollbar {
            width: 12px;
        }

        #content::-webkit-scrollbar-track {
            background: #392611;
        }

        #content::-webkit-scrollbar-thumb {
            background: #a68b7d;
            border: 2px solid #392611;
            border-radius: 4px;
        }

        #content::-webkit-scrollbar-thumb:hover {
            background: #bda294;
        }

        table.stat-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.stat-table td {
            padding: 2px 4px;
            vertical-align: top;
        }

        table.stat-table td.stat-name {
            width: 40%;
            white-space: nowrap;
        }

        table.stat-table td.stat-value {
            width: 60%;
            word-break: break-word;
        }

        .verb-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
        }

        .verb-button {
            background: #271a0c;
            border: 1px solid #1a1108;
            color: #e1e1d7;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
        }

        .verb-button:hover {
            background: #3f2a13;
            color: #ff8040;
            border-color: #ff8040;
        }

        .verb-button:active {
            background: #1a1108;
            transform: translateY(1px);
        }

        .verb-category-header {
            background: #1a1108;
            color: #ff8040;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #ff8040;
            margin-top: 10px;
        }

        .verb-category-header:first-child {
            margin-top: 0;
        }

        table.stat-table tr.empty-stat td {
            height: 10px;
        }
    </style>
</head>

<body>
    <div id="tabs"></div>
    <div id="content">
        <div id="stats-container">
            <div style="padding: 20px; text-align: center;">
                Loading info panel...
            </div>
        </div>
        <div id="verbs-container"></div>
    </div>

    <script>
        let currentTab = "Status";
        let lastTabsJSON = "";
        let lastVerbsJSON = "";
        let lastStatsJSON = "";
        let lastActiveTab = "";

        function receiveStats(dataString) {
            if (!dataString) {
                console.log("No data received");
                return;
            }

            let data;
            try {
                data = JSON.parse(dataString);
            } catch (e) {
                console.error("Failed to parse stat data:", e, dataString);
                return;
            }

            if (!data) return;

            if (data.current_tab) {
                currentTab = data.current_tab;
            }

            // Only render tabs if they changed or active tab changed
            const tabsJSON = JSON.stringify(data.tabs);
            if (tabsJSON !== lastTabsJSON || currentTab !== lastActiveTab) {
                renderTabs(data.tabs);
                lastTabsJSON = tabsJSON;
                lastActiveTab = currentTab;
            }

            // Only render stats if they changed
            const statsJSON = JSON.stringify(data.stats);
            if (statsJSON !== lastStatsJSON) {
                renderStats(data.stats);
                lastStatsJSON = statsJSON;
            }

            // Only render verbs if they changed
            const verbsJSON = JSON.stringify(data.verbs);
            if (verbsJSON !== lastVerbsJSON) {
                renderVerbs(data.verbs);
                lastVerbsJSON = verbsJSON;
            }
        }

        function renderVerbs(verbs) {
            const container = document.getElementById("verbs-container");
            container.innerHTML = "";

            // Group verbs by category
            const grouped = {};
            verbs.forEach((v) => {
                if (!grouped[v.category]) grouped[v.category] = [];
                grouped[v.category].push(v);
            });

            const categories = Object.keys(grouped).sort();

            categories.forEach((cat) => {
                if (categories.length > 1 || currentTab === "Admin") {
                    const header = document.createElement("div");
                    header.className = "verb-category-header";
                    header.innerText = cat;
                    container.appendChild(header);
                }

                const verbList = document.createElement("div");
                verbList.className = "verb-list";

                grouped[cat].forEach((verb) => {
                    const button = document.createElement("a");
                    button.className = "verb-button";
                    button.innerText = verb.name;
                    button.href = `byond://?action=execute_verb&verb=${encodeURIComponent(verb.command)}`;
                    verbList.appendChild(button);
                });

                container.appendChild(verbList);
            });
        }

        function renderTabs(tabs) {
            const tabsDiv = document.getElementById("tabs");
            tabsDiv.innerHTML = "";

            tabs.forEach((tab) => {
                const tabEl = document.createElement("div");
                tabEl.className = "tab";
                if (tab === currentTab) {
                    tabEl.classList.add("active");
                }
                tabEl.innerText = tab;
                tabEl.onclick = () => {
                    currentTab = tab;
                    notifyServerTabChange(tab);
                    renderTabs(tabs);
                };
                tabsDiv.appendChild(tabEl);
            });
        }

        function renderStats(stats) {
            const container = document.getElementById("stats-container");
            container.innerHTML = "";

            if (!stats || stats.length === 0) return;

            const table = document.createElement("table");
            table.className = "stat-table";

            stats.forEach((stat) => {
                const tr = document.createElement("tr");

                if (!stat.name && !stat.value) {
                    tr.className = "empty-stat";
                    const td = document.createElement("td");
                    td.colSpan = 2;
                    tr.appendChild(td);
                } else {
                    const nameTd = document.createElement("td");
                    nameTd.className = "stat-name";
                    nameTd.innerHTML = stat.name || "";

                    const valueTd = document.createElement("td");
                    valueTd.className = "stat-value";
                    valueTd.innerHTML = stat.value || "";

                    tr.appendChild(nameTd);
                    tr.appendChild(valueTd);
                }
                table.appendChild(tr);
            });

            container.appendChild(table);
        }

        function notifyServerTabChange(newTab) {
            window.location.href = `byond://?action=statpanel_tab&tab=${encodeURIComponent(newTab)}`;
        }

        window.receiveStats = receiveStats;

        // Signal ready to server
        window.onload = () => {
            window.location.href = "byond://?action=statpanel_ready";
        };

        // forces focus back to the game after clicking something on the statpanel
        document.addEventListener("click", function (e) {
            // hopefully don't trigger when clicking on the chat
            if (e.target.closest("input, textarea")) return;
            if (e.target.closest("a[href^='byond://']")) return;

            window.location.href = "byond://?action=refocus_map";
        });
    </script>
</body>

</html>
